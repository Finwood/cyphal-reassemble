name: Wheels

on:
  push:
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-wheels:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: pypa/cibuildwheel@v2.23.2
        env:
          CIBW_BUILD: cp312-manylinux_x86_64
          CIBW_ARCHS_LINUX: x86_64
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
          CIBW_BEFORE_ALL: bash scripts/install_arrow_cpp.sh
          CIBW_BEFORE_BUILD: pip install auditwheel patchelf build wheel hatchling
          CIBW_BUILD_FRONTEND: build
          CIBW_BUILD_COMMAND: bash scripts/build_wheel.sh {output_dir}
          CIBW_TEST_COMMAND: bash scripts/test_installed_wheel.sh {project}
          CIBW_TEST_REQUIRES: pytest pyarrow

      - uses: actions/upload-artifact@v4
        with:
          name: cyphal-reassemble-wheels
          path: wheelhouse/*.whl
          if-no-files-found: error

  publish:
    needs: build-wheels
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: cyphal-reassemble-wheels
          path: wheelhouse

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: wheelhouse/
