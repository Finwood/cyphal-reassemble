name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Arrow C++ and build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y -V ca-certificates lsb-release wget cmake g++
          wget https://apache.jfrog.io/artifactory/arrow/$(lsb_release --id --short | tr 'A-Z' 'a-z')/apache-arrow-apt-source-latest-$(lsb_release --codename --short).deb
          sudo apt-get install -y -V ./apache-arrow-apt-source-latest-$(lsb_release --codename --short).deb
          sudo apt-get update
          sudo apt-get install -y -V libarrow-dev make

      - name: Build
        run: make

      - name: Test
        run: make test

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Python tests
        run: |
          uv sync
          uv run pytest python_tests/ -v

      - name: Smoke test platform wheel build
        run: |
          sudo apt-get install -y patchelf
          uv pip install auditwheel
          ./scripts/build_wheel.sh
          unzip -l dist/cyphal_reassemble-*-manylinux_*.whl | grep '_bin/cyphal-reassemble'
